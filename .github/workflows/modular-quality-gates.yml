name: Modular Quality Gates

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  modular-quality:
    name: Architecture And Modular Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile
        run: ./mvnw -B -DskipTests compile

      - name: Enforce Module Boundaries
        run: ./mvnw -B -DskipTests=false -Dtest=ModuleBoundariesTest test

      - name: Run Phase 1 Modular Suite
        run: ./mvnw -B -DskipTests=false -Dtest=AuthSessionServiceTest,AuthJwtAuthenticationFilterTest,AuthModuleControllerTest,SecurityConfigAuthIntegrationTest,CareerServiceTest,CareerControllerTest test
